<!-- Extending the base layout from the layout.html -->
{% extends "static/layout.html" %}

{% block title %} Home {% endblock %}

{% block content %}
    <h1 class="text-center">Lists</h1>
    <table class="table table-bordered table-stripped text-center">
        <thead class="thead-dark">
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Due Date</th>
            </tr>
        </thead>
        <tbody>
            {% for list in lists %}
            <tr>
                <td>{{list.Title}}</td>
                <td>{{list.Description}}</td>
                <td>{{list.Due_date}}</td>
                <td>
                    <a href="{% url 'delete_list' list.Title %}" class="btn btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
