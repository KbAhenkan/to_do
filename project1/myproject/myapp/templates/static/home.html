<!-- Extending the base layout from the layout.html file-->

{% extends "static/layout.html" %}

{% block title %} Home {% endblock %}

{% block content%}
    <div class="jumbotron text-center">
        <h1 class="display-4">To-Do List App</h1>
        <p class="lead">Create a new item</p>
        <hr class="my-4">
        <p>
            Use the navigation bar to add, view, or delete your lists
        </p>
        <a href="{% url 'show_list'%}" class="btn btn-primary btn-lg" role="button">View List</a>
    </div>
{% endblock %}
